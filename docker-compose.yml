services:
  # -------------------------------------------------------
  # PostgreSQL Database
  # -------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: baxter_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-baxter_demo}
      POSTGRES_USER:     ${POSTGRES_USER:-baxter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-baxter_secret_123}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Only accessible via localhost / SSH tunnel (not exposed to public)
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-baxter} -d ${POSTGRES_DB:-baxter_demo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -------------------------------------------------------
  # Grafana Dashboard
  # -------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    container_name: baxter_grafana
    environment:
      GF_SECURITY_ADMIN_USER:     ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_INSTALL_PLUGINS:         ""
      POSTGRES_PASSWORD:           ${POSTGRES_PASSWORD:-baxter_secret_123}
    volumes:
      - /data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # -------------------------------------------------------
  # Email Ingestor (Python)
  # -------------------------------------------------------
  ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile
    container_name: baxter_ingestor
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./sample_data:/app/sample_data:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import db; db.get_shipment_count()' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes: {}
